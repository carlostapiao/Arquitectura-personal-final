name: 'CI/CD Lab 21'

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: 'Deploy Infra and App'
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init & Apply
        run: |
          terraform init
          terraform apply -auto-approve
        working-directory: ./terraform

      - name: Build & Push Docker
        run: |
          az acr login --name acrcarlos69lm
          docker buildx build --platform linux/amd64 -t acrcarlos69lm.azurecr.io/app-pro:v1 ./app --push

      - name: Get AKS Context
        run: |
          az aks get-credentials --resource-group rg-k8s-lab-pro --name aks-lab --overwrite-existing

      - name: Kubernetes Deploy
        run: |
          kubectl apply -f k8s/