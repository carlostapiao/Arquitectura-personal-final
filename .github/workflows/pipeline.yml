name: 'CI/CD Lab 21'

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: acrcarlos69lm.azurecr.io
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init & Apply
        run: |
          terraform init
          terraform apply -auto-approve
        working-directory: ./terraform

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Construimos con el ID de ejecución para forzar el refresco en AKS
      - name: Build & Push
        uses: docker/build-push-action@v4
        with:
          context: ./app
          platforms: linux/amd64
          push: true
          tags: acrcarlos69lm.azurecr.io/app-pro:${{ github.run_id }}

      - name: Get AKS Context
        run: az aks get-credentials --resource-group rg-k8s-lab-pro --name aks-lab --overwrite-existing

      - name: Kubernetes Deploy
        run: |
          # Cambiamos la imagen en el YAML por la nueva etiqueta dinámica
          sed -i 's|image:.*|image: acrcarlos69lm.azurecr.io/app-pro:${{ github.run_id }}|g' k8s/deployment.yaml
          kubectl apply -f k8s/
          # Verificamos el estado del despliegue
          kubectl rollout status deployment/it-support-app --timeout=60s