name: 'CI/CD Lab 21'

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init & Apply
        run: |
          terraform init
          terraform apply -auto-approve
        working-directory: ./terraform

      # --- SOLUCIÓN ARQUITECTURA ---
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build & Push Docker v21
        run: |
          az acr login --name acrcarlos69lm
          docker buildx build \
            --platform linux/amd64 \
            --tag acrcarlos69lm.azurecr.io/app-pro:v1 \
            --push ./app

      - name: Get AKS Context
        run: az aks get-credentials --resource-group rg-k8s-lab-pro --name aks-lab --overwrite-existing

      - name: Kubernetes Deploy
        run: |
          kubectl apply -f k8s/
          kubectl rollout restart deployment it-support-app