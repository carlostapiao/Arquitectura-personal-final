name: 'CI/CD Lab 21 - Ingress Mode'

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: acrcarlos69lm.azurecr.io
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init & Apply
        run: |
          terraform init
          terraform apply -auto-approve
        working-directory: ./terraform

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build & Push
        uses: docker/build-push-action@v4
        with:
          context: ./app
          platforms: linux/amd64
          push: true
          tags: acrcarlos69lm.azurecr.io/app-pro:${{ github.run_id }}

      - name: Get AKS Context
        run: az aks get-credentials --resource-group rg-k8s-lab-pro --name aks-lab --overwrite-existing

      - name: Kubernetes Deploy
        run: |
          sed -i 's|acrcarlos69lm.azurecr.io/app-pro:.*|acrcarlos69lm.azurecr.io/app-pro:${{ github.run_id }}|g' k8s/deployment.yaml
          kubectl apply -f k8s/
          kubectl rollout status deployment/it-support-app --timeout=300s

      - name: Wait for Ingress IP & Update APIM
        run: |
          echo "Buscando IP pública del Ingress Controller..."
          ING_IP=""
          # Reintento de 3 minutos para que Azure asigne la IP al Ingress
          for i in {1..18}; do
            ING_IP=$(kubectl get ingress it-support-ingress -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            if [ -n "$ING_IP" ]; then
              break
            fi
            echo "Esperando IP del Ingress... (reintento $i)"
            sleep 10
          done

          if [ -z "$ING_IP" ]; then
            echo "Error: No se encontró IP pública en el Ingress"
            exit 1
          fi

          echo "IP del Ingress: $ING_IP"

          # Actualizar APIM para que su Backend sea el Ingress
          az apim api update --resource-group rg-k8s-lab-pro \
            --service-name apimcarlos69lm \
            --api-id tickets-api \
            --service-url "http://$ING_IP"