name: 'CI/CD Lab 21 - NGINX Ingress Automation'

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: acrcarlos69lm.azurecr.io
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init & Apply
        run: |
          terraform init
          terraform apply -auto-approve
        working-directory: ./terraform

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build & Push App
        uses: docker/build-push-action@v4
        with:
          context: ./app
          platforms: linux/amd64
          push: true
          tags: acrcarlos69lm.azurecr.io/app-pro:${{ github.run_id }}

      - name: Get AKS Context
        run: az aks get-credentials --resource-group rg-k8s-lab-pro --name aks-lab --overwrite-existing

      - name: Kubernetes Deploy
        run: |
          # 1. Inyectar el tag de imagen dinámico
          sed -i 's|acrcarlos69lm.azurecr.io/app-pro:.*|acrcarlos69lm.azurecr.io/app-pro:${{ github.run_id }}|g' k8s/deployment.yaml
          
          # 2. Aplicar manifiestos (Service debe ser ClusterIP e Ingress con class nginx)
          kubectl apply -f k8s/
          
          # 3. Verificar despliegue
          kubectl rollout status deployment/it-support-app --timeout=300s

      - name: Wait for NGINX Controller IP & Update APIM
        run: |
          echo "Buscando IP pública del controlador NGINX (Helm)..."
          NGINX_IP=""
          
          # Reintento de 5 minutos (Azure tarda en asignar la IP al LoadBalancer de NGINX)
          for i in {1..30}; do
            # Buscamos la IP en el namespace 'ingress-basic' definido en tu main.tf
            NGINX_IP=$(kubectl get svc -n ingress-basic ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            
            if [ -n "$NGINX_IP" ]; then
              break
            fi
            echo "IP de NGINX aún no asignada, reintentando en 10s... (intento $i)"
            sleep 10
          done

          if [ -z "$NGINX_IP" ]; then
            echo "Error: No se pudo obtener la IP de NGINX en el namespace ingress-basic"
            kubectl get svc -n ingress-basic
            exit 1
          fi

          echo "IP de NGINX encontrada: $NGINX_IP"

          # Actualizar el Backend de APIM con la IP del controlador NGINX
          az apim api update --resource-group rg-k8s-lab-pro \
            --service-name apimcarlos69lm \
            --api-id tickets-api \
            --service-url "http://$NGINX_IP"
          
          echo "¡Laboratorio 21 completado! APIM ahora apunta a NGINX Ingress."