name: 'CI/CD Lab 21'

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: acrcarlos69lm.azurecr.io
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init & Apply (Infraestructura)
        run: |
          terraform init
          terraform apply -auto-approve
        working-directory: ./terraform

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build & Push App
        uses: docker/build-push-action@v4
        with:
          context: ./app
          push: true
          tags: acrcarlos69lm.azurecr.io/app-pro:${{ github.run_id }}

      - name: Get AKS Context
        run: az aks get-credentials --resource-group rg-k8s-lab-pro --name aks-lab --overwrite-existing

      - name: Kubernetes Deploy
        run: |
          # Actualizamos la imagen en el manifiesto
          sed -i 's|acrcarlos69lm.azurecr.io/app-pro:.*|acrcarlos69lm.azurecr.io/app-pro:${{ github.run_id }}|g' k8s/deployment.yaml
          
          # Aplicamos todos los archivos (incluyendo el nuevo Service LoadBalancer)
          kubectl apply -f k8s/
          
          # Esperamos a que el Deployment esté listo
          kubectl rollout status deployment/it-support-app --timeout=90s

      - name: Wait for LoadBalancer IP & Update APIM
        run: |
          # 1. Esperar hasta obtener la IP pública del servicio
          LB_IP=""
          while [ -z "$LB_IP" ]; do
            echo "Esperando IP del LoadBalancer..."
            LB_IP=$(kubectl get svc it-support-service -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            [ -z "$LB_IP" ] && sleep 10
          done
          echo "IP encontrada: $LB_IP"

          # 2. Actualizar el Backend de APIM automáticamente usando Azure CLI
          # Esto hace que APIM apunte siempre a la IP viva del clúster
          az apim api update --resource-group rg-k8s-lab-pro \
            --service-name apimcarlos69lm \
            --api-id Tickets-API-Pro \
            --service-url "http://$LB_IP/api"