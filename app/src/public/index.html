<!DOCTYPE html>
<html>
<head>
    <title>IT Support Pro</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h1 { color: #1a73e8; }
        .ticket { border-left: 4px solid #1a73e8; padding: 10px; margin: 10px 0; background: #f8f9fa; }
        button { background: #1a73e8; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Soporte IT - Lab 21</h1>
        <div id="tickets"></div>
    </div>
    <script>
        fetch('/api/tickets').then(r => r.json()).then(data => {
            document.getElementById('tickets').innerHTML = data.map(t => `
                <div class="ticket"><strong>${t.titulo}</strong><br>${t.descripcion}</div>
            `).join('');
        });
    </script>
</body>
</html>
