<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Support System - Lab 21</title>
    <!-- Bootstrap desde CDN (Siempre funciona) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tu estilo personalizado (Ruta relativa limpia) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <h1>IT Support System</h1>

        <div class="card mb-5">
            <div class="card-body">
                <h2 class="h4 mb-4">Abrir Nuevo Ticket</h2>
                <form id="ticketForm" class="row g-3">
                    <div class="col-md-4">
                        <input type="text" id="usuario" class="form-control" placeholder="Nombre de usuario" required>
                    </div>
                    <div class="col-md-5">
                        <input type="text" id="titulo" class="form-control" placeholder="Asunto del problema" required>
                    </div>
                    <div class="col-md-2">
                        <select id="prioridad" class="form-select">
                            <option value="Baja">Baja</option>
                            <option value="Media" selected>Media</option>
                            <option value="Alta">Alta</option>
                        </select>
                    </div>
                    <div class="col-md-1">
                        <button type="submit" class="btn btn-primary w-100">Crear</button>
                    </div>
                </form>
            </div>
        </div>

        <h2 class="h4 mb-3">Tickets Activos</h2>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Usuario</th>
                    <th>Asunto</th>
                    <th>Prioridad</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="ticketsTableBody">
                <!-- Los datos se cargarán aquí -->
            </tbody>
        </table>
    </div>

    <!-- Script principal (Ruta relativa limpia) -->
    <script src="script.js"></script>
</body>
</html>
